framework:
    messenger:
        # Uncomment this (and the failed transport below) to send failed messages to this transport for later handling.
        # failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            # async: '%env(MESSENGER_TRANSPORT_DSN)%'
            # failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Common\Bus\CommandRequestInterface: sync
            App\Common\Bus\QueryRequestInterface: sync
            App\Common\Domain\EventHandling\DomainEventInterface: sync
            Symfony\Component\Mailer\Messenger\SendEmailMessage: sync

        default_bus: default.bus
        buses:
            default.bus:
                middleware:

            command.bus:
                middleware:
                    - validation
                    - doctrine_transaction
                    - App\Common\Infrastructure\EventHandling\Symfony\DomainEventsPublisherMiddleware

            query.bus:
                middleware:
                    - validation

            domain.event.bus:
                default_middleware:
                    allow_no_handlers: true
                    allow_no_senders: false
                middleware:

